<!DOCTYPE html>
<html>
<head>

<title>AV Rack Monitoring Dashboard</title>

<style>

body{
background:#0f1117;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:30px;
}

.container{
width:95%;
margin:auto;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin:30px 0;
}

.card{
background:#1c212c;
padding:20px;
border-radius:10px;
width:180px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.value{
font-size:32px;
font-weight:bold;
color:#00e5ff;
}

.status{
font-size:22px;
margin-top:20px;
}

.charts{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
gap:30px;
margin-top:40px;
}

iframe{
width:100%;
height:260px;
border:none;
background:white;
border-radius:10px;
}

</style>

</head>

<body>

<h1>AV Rack Monitoring Dashboard</h1>

<div class="container">

<div class="cards">

<div class="card">
Temperature
<div class="value" id="temp">--</div>
</div>

<div class="card">
Humidity
<div class="value" id="hum">--</div>
</div>

<div class="card">
Smoke
<div class="value" id="smoke">--</div>
</div>

<div class="card">
Sound
<div class="value" id="sound">--</div>
</div>

<div class="card">
Vibration X
<div class="value" id="vibx">--</div>
</div>

</div>

<div class="status" id="status">
System Status : NORMAL
</div>

<div class="charts">

<iframe src="https://thingspeak.com/channels/3272717/charts/1?dynamic=true&results=20"></iframe>

<iframe src="https://thingspeak.com/channels/3272717/charts/2?dynamic=true&results=20"></iframe>

<iframe src="https://thingspeak.com/channels/3272717/charts/3?dynamic=true&results=20"></iframe>

<iframe src="https://thingspeak.com/channels/3272717/charts/4?dynamic=true&results=20"></iframe>

<iframe src="https://thingspeak.com/channels/3272717/charts/5?dynamic=true&results=20"></iframe>

<iframe src="https://thingspeak.com/channels/3272717/charts/6?dynamic=true&results=20"></iframe>

<iframe src="https://thingspeak.com/channels/3272717/charts/7?dynamic=true&results=20"></iframe>

</div>

</div>

<script>

async function loadData(){

let response = await fetch("https://api.thingspeak.com/channels/3272717/feeds/last.json");

let data = await response.json();

document.getElementById("temp").innerText=data.field1+" °C";
document.getElementById("hum").innerText=data.field2+" %";
document.getElementById("vibx").innerText=data.field3;
document.getElementById("smoke").innerText=data.field6;
document.getElementById("sound").innerText=data.field7;

let smoke=parseInt(data.field6);

if(smoke>1600)
{
document.getElementById("status").innerHTML="🚨 SMOKE DETECTED";
document.getElementById("status").style.color="red";
}
else
{
document.getElementById("status").innerHTML="✅ SYSTEM NORMAL";
document.getElementById("status").style.color="lime";
}

}

loadData();

setInterval(loadData,10000);

</script>

</body>
</html>
